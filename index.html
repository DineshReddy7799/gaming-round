<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8205637704400457"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Practice Suite - Refined</title>
    <style>
        :root {
            --bg-color: #e0e0e0;
            --panel-bg: #f0f0f0;
            --accent: #333;
            --highlight: #4CAF50;
            --selected: #2196F3;
            --error: #f44336;
            --text-main: #444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
        }

        /* Navigation */
        .nav-bar {
            background: #333;
            width: 100%;
            padding: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .nav-btn {
            background: #555;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .nav-btn:hover, .nav-btn.active {
            background: white;
            color: #333;
        }

        /* Game Container */
        #game-wrapper {
            margin-top: 20px;
            width: 90%;
            max-width: 700px;
            height: 650px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #game-header {
            background: #333;
            color: white;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 0.95rem;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .help-btn {
            background: rgba(255,255,255,0.2);
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.8rem; margin-left: 10px;
        }

        #game-container {
            background: var(--panel-bg);
            flex-grow: 1;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hidden { display: none !important; }

        /* --- MODALS --- */
        .modal-instruction {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            padding: 15px 20px;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            width: 80%;
            text-align: left;
            font-size: 0.9rem;
            color: #444;
            z-index: 50;
            line-height: 1.5;
            border-left: 5px solid #333;
            display: flex;
            flex-direction: column;
        }
        .modal-instruction.top { top: 10px; }
        .modal-instruction.bottom { bottom: 60px; }

        .modal-instruction ul {
            margin: 5px 0 10px 0;
            padding-left: 20px;
        }
        .modal-instruction li {
            margin-bottom: 4px;
        }
        
        .close-instr {
            align-self: flex-end;
            background: #333;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        .close-instr:hover { background: #555; }

        /* --- CONTROLS --- */
        .game-controls-bar {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            background: #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .control-btn:hover { background: #666; transform: translateY(-2px); }
        .control-btn.active { background: #2196F3; border-color: white; box-shadow: 0 0 10px #2196F3; transform: scale(1.1); }
        .control-btn.check { background: #4CAF50; margin-left: 20px; }
        .control-btn.check:hover { background: #43A047; }

        .timer-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
            background: white;
            font-size: 1rem;
        }

        /* --- GAME VIEWS --- */
        .game-view {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* GAME 1: BUBBLES */
        #bubble-canvas { width: 100%; height: 100%; position: relative; }
        .bubble {
            width: 100px; height: 100px; border-radius: 50%; background: white;
            position: absolute; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.3s;
            font-weight: 600; font-size: 1.2rem; color: #444; border: 2px solid #eee;
        }
        .bubble:hover { transform: scale(1.1); z-index: 10; border-color: #ccc; }
        .bubble.correct { transform: scale(0); opacity: 0; }

        /* GAME 2: ARROWS (5x5) */
        #arrow-grid {
            display: grid;
            grid-template-columns: repeat(5, 60px); 
            grid-template-rows: repeat(5, 60px);
            gap: 3px;
            background: #bbb;
            padding: 5px;
            border-radius: 4px;
            margin-top: 10px; 
        }

        .tile {
            width: 60px; height: 60px; background: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; cursor: pointer; color: #666;
            transition: transform 0.2s, background-color 0.3s, border 0.1s;
            border: 2px solid transparent;
        }
        
        .tile.start { background: #eee; color: #333; }
        .tile.end { background: #eee; color: #333; }
        
        .tile.path-active {
            background-color: #e8f5e9; color: #2e7d32;
            box-shadow: inset 0 0 0 2px #4CAF50;
        }
        .tile.selected {
            border-color: #2196F3; background-color: #E3F2FD;
            animation: pulse-border 1s infinite; z-index: 5;
        }

        /* GAME 3: MAZE */
        #maze-grid {
            display: grid;
            grid-template-columns: repeat(6, 55px);
            grid-template-rows: repeat(6, 55px);
            gap: 1px;
            background: #999;
            border: 5px solid #ccc;
            margin-bottom: 80px; 
        }
        .maze-cell {
            width: 55px; height: 55px; background: #eee;
            display: flex; align-items: center; justify-content: center; font-size: 2rem;
            position: relative;
        }
        .wall-hit { background: #ef5350 !important; } 
        
        /* Hit feedback text */
        .hit-feedback {
            position: absolute; top: -30px; left: 0; right: 0;
            text-align: center; color: #d32f2f; font-weight: bold;
            opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        .hit-feedback.show { opacity: 1; }

        /* Icons */
        .icon-user { 
            width: 20px; height: 20px; background: #333; border-radius: 50%; position: relative; 
        }
        .icon-user::after {
            content: ''; position: absolute; top: 22px; left: -4px; width: 28px; height: 14px; background: #333; border-radius: 15px 15px 0 0;
        }
        .icon-key { font-size: 1.8rem; color: black; transform: rotate(45deg); }
        .icon-door { 
            width: 24px; height: 36px; border: 3px solid #333; border-bottom: none; border-radius: 15px 15px 0 0; position: relative;
        }

        @keyframes pulse-border {
            0% { border-color: #2196F3; }
            50% { border-color: #64B5F6; }
            100% { border-color: #2196F3; }
        }

        /* Overlay */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .success-msg { font-size: 1.5rem; font-weight: bold; color: #333; margin-bottom: 20px; }
        <section id="about-assessment-suite" style="padding: 20px; font-family: sans-serif; line-height: 1.6; color: #444; max-width: 800px; margin: 0 auto;">

</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchGame(1)">1. Bubble Math</button>
        <button class="nav-btn" onclick="switchGame(2)">2. Arrow Grid</button>
        <button class="nav-btn" onclick="switchGame(3)">3. Invisible Maze</button>
    </div>

    <div id="game-wrapper">
        <div id="game-header">
            <span id="question-counter">Question 1 of 1</span>
            <div style="display:flex; align-items:center;">
                <span>Assessment Mode</span>
                <div class="help-btn" onclick="showInstructions()">?</div>
            </div>
        </div>
        
        <div id="game-container">
            
            <!-- INSTRUCTION MODALS -->
            <div id="instr-modal" class="modal-instruction hidden">
                <div id="instr-content">Instructions</div>
                <button class="close-instr" onclick="closeInstructions()">Got it</button>
            </div>

            <!-- GAME 1: BUBBLES -->
            <div id="game-1" class="game-view">
                <div id="bubble-canvas"></div>
                <div class="modal-instruction bottom" style="width: auto; padding: 10px 30px; text-align: center; bottom: 20px;">
                    Select bubbles in order from <b>LOWEST</b> value to <b>HIGHEST</b> value.
                </div>
            </div>

            <!-- GAME 2: ARROWS -->
            <div id="game-2" class="game-view hidden">
                <div id="arrow-grid"></div>
                <div class="game-controls-bar">
                    <div class="timer-circle" id="timer-display-2">4:00</div>
                    <button class="control-btn active" id="btn-rotate" title="Rotate Mode" onclick="setArrowMode('rotate')">&#x27F3;</button>
                    <button class="control-btn" id="btn-swap" title="Swap Mode" onclick="setArrowMode('swap')">&#x21C4;</button>
                    <button class="control-btn check" title="Check Answer" onclick="checkArrowWin()">&#x2713;</button>
                </div>
            </div>

            <!-- GAME 3: MAZE -->
            <div id="game-3" class="game-view hidden">
                <div style="position:relative;">
                    <div id="hit-msg" class="hit-feedback">BLOCKED!</div>
                    <div id="maze-grid"></div>
                </div>
                <div class="game-controls-bar" style="bottom: 130px;">
                     <div class="timer-circle" id="timer-display-3">4:00</div>
                </div>
            </div>

            <!-- Success Overlay -->
            <div id="overlay" class="hidden">
                <div class="success-msg" id="win-msg">Correct!</div>
                <button class="nav-btn" id="next-btn" onclick="nextLevel()">Next Question</button>
            </div>

        </div>
    </div>

    <script>
        let currentGame = 1;
        let timerInterval;
        let currentQuestion = 1;
        const maxQuestions = 4;
        
        let arrowMode = 'rotate';
        let selectedTile = null;

        function switchGame(num) {
            currentGame = num;
            document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === num));
            document.querySelectorAll('.game-view').forEach((v, i) => v.classList.toggle('hidden', i + 1 !== num));
            document.getElementById('overlay').classList.add('hidden');
            startNewSession();
        }

        function showInstructions() {
            const modal = document.getElementById('instr-modal');
            const txt = document.getElementById('instr-content');
            
            if(currentGame === 1) {
                modal.classList.add('hidden');
            } else if(currentGame === 2) {
                modal.classList.remove('hidden');
                modal.className = 'modal-instruction top';
                txt.innerHTML = `
                    <strong>Arrow Grid Rules:</strong>
                    <ul>
                        <li><b>Goal:</b> Connect GREEN arrow to BLUE circle.</li>
                        <li><b>Swap Mode (&#x21C4;):</b> Click two tiles to swap positions.</li>
                        <li><b>Rotate Mode (&#x27F3;):</b> Click a tile to rotate 90&deg;.</li>
                    </ul>`;
            } else if(currentGame === 3) {
                modal.classList.remove('hidden');
                modal.className = 'modal-instruction bottom';
                txt.innerHTML = `
                    <strong>Invisible Maze Rules:</strong>
                    <ul>
                        <li><b>Goal:</b> Get KEY, then DOOR.</li>
                        <li><b>Movement:</b> Use Arrow Keys.</li>
                        <li><b>Invisible Walls:</b> Most paths are blocked. If you flash RED, it's a wall. Memorize it and try another way.</li>
                    </ul>`;
            }
        }

        function closeInstructions() {
            document.getElementById('instr-modal').classList.add('hidden');
        }

        function updateHeader(current, total) {
            document.getElementById('question-counter').innerText = `Question ${current} of ${total}`;
        }

        function startNewSession() {
            currentQuestion = 1;
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('next-btn').innerText = "Next Question";
            
            if(currentGame === 1) initBubbles();
            if(currentGame === 2) { generateArrowLevel(); startTimer('timer-display-2'); }
            if(currentGame === 3) { generateMazeLevel(); startTimer('timer-display-3'); }
            
            updateHeader(currentQuestion, currentGame === 1 ? 1 : maxQuestions);
            showInstructions();
        }

        function nextLevel() {
            if(currentGame === 1) { startNewSession(); return; }
            currentQuestion++;
            if(currentQuestion > maxQuestions) {
                document.getElementById('win-msg').innerText = "Section Complete!";
                document.getElementById('next-btn').innerText = "Restart";
                document.getElementById('next-btn').onclick = startNewSession;
                document.getElementById('overlay').classList.remove('hidden');
                clearInterval(timerInterval);
            } else {
                updateHeader(currentQuestion, maxQuestions);
                document.getElementById('overlay').classList.add('hidden');
                if(currentGame === 2) generateArrowLevel();
                if(currentGame === 3) generateMazeLevel();
            }
        }

        function startTimer(elementId) {
            clearInterval(timerInterval);
            let timeLeft = 240; 
            const display = document.getElementById(elementId);
            if(!display) return;
            display.innerText = "4:00";
            timerInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft < 0) { clearInterval(timerInterval); alert("Time's Up!"); return; }
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                display.innerText = `${m}:${s < 10 ? '0' + s : s}`;
            }, 1000);
        }

        function showWin(msg = "Correct!") {
            document.getElementById('win-msg').innerText = msg;
            document.getElementById('next-btn').onclick = nextLevel;
            document.getElementById('overlay').classList.remove('hidden');
        }

        // --- GAME 1: BUBBLES ---
        const bubbleCanvas = document.getElementById('bubble-canvas');
        let bubbleValues = [];
        function initBubbles() {
            bubbleCanvas.innerHTML = '';
            bubbleValues = [];
            const data = [];
            for(let i=0; i<3; i++) {
                let type = Math.random();
                let q = {};
                if(type < 0.33) { 
                    let a = Math.floor(Math.random() * 8) + 2;
                    let b = Math.floor(Math.random() * 8) + 2;
                    q = { eq: `${a} × ${b}`, v: a*b };
                } else if(type < 0.66) { 
                    let b = Math.floor(Math.random() * 5) + 2;
                    let res = Math.floor(Math.random() * 10) + 2;
                    q = { eq: `${res*b} ÷ ${b}`, v: res };
                } else { 
                    let a = Math.floor(Math.random() * 20) + 5;
                    let b = Math.floor(Math.random() * 20) + 5;
                    q = { eq: `${a} + ${b}`, v: a+b };
                }
                data.push(q);
            }

            let positions = [];
            data.forEach((d, i) => {
                const el = document.createElement('div');
                el.className = 'bubble';
                el.innerText = d.eq;
                let top, left, overlap;
                let attempts = 0;
                do {
                    overlap = false;
                    top = 10 + Math.random() * 60; 
                    left = 10 + Math.random() * 60; 
                    for(let p of positions) {
                        let dist = Math.sqrt(Math.pow(p.left - left, 2) + Math.pow(p.top - top, 2));
                        if(dist < 25) { overlap = true; break; }
                    }
                    attempts++;
                } while(overlap && attempts < 50);
                positions.push({top, left});
                el.style.left = left + '%'; el.style.top = top + '%';
                el.onclick = () => checkBubble(i, d.v, el);
                bubbleCanvas.appendChild(el);
                bubbleValues.push({id:i, val:d.v, clicked:false});
            });
        }
        
        function checkBubble(id, val, el) {
            const remaining = bubbleValues.filter(b => !b.clicked);
            const min = remaining.reduce((p, c) => p.val < c.val ? p : c);
            if(val === min.val) {
                bubbleValues.find(b=>b.id===id).clicked = true;
                el.classList.add('correct');
                if(remaining.length === 1) showWin();
            } else {
                el.style.background = '#ffcdd2'; setTimeout(()=>el.style.background='white', 500);
            }
        }

        // --- GAME 2: ARROWS ---
        const arrowGrid = document.getElementById('arrow-grid');
        let arrowState = [];
        const tileDefs = {
            'S': { char:'➡', conn:[0,1,0,0] }, 
            'E': { char:'◑', conn:[0,0,0,1] }, 
            '-': { char:'━', conn:[0,1,0,1] },
            '|': { char:'┃', conn:[1,0,1,0] },
            'L': { char:'┗', conn:[1,1,0,0] }
        };

        function setArrowMode(mode) {
            arrowMode = mode;
            selectedTile = null;
            renderArrowGrid(); 
            document.getElementById('btn-rotate').classList.toggle('active', mode === 'rotate');
            document.getElementById('btn-swap').classList.toggle('active', mode === 'swap');
        }

        function generateArrowLevel() {
            arrowState = [];
            let path = [];
            let r = Math.floor(Math.random()*5), c = 0;
            path.push({r, c, type:'S'});
            path.push({r: r, c: c+1, inDir: 'left', type: 'TEMP'});
            c++; 

            while(c < 4) {
                let moves = [];
                if(c<4) moves.push({r, c:c+1, dir:'right'});
                if(r>0 && !path.some(p=>p.r===r-1 && p.c===c)) moves.push({r:r-1, c, dir:'up'});
                if(r<4 && !path.some(p=>p.r===r+1 && p.c===c)) moves.push({r:r+1, c, dir:'down'});
                let move = moves.filter(m=>m.dir==='right').length && Math.random()>.3 ? moves.find(m=>m.dir==='right') : moves[Math.floor(Math.random()*moves.length)];
                let prev = path[path.length-1];
                prev.outDir = move.dir;
                let inDir = move.dir==='right'?'left':(move.dir==='up'?'down':'up');
                r = move.r; c = move.c;
                path.push({r, c, inDir, type:'TEMP'});
            }
            path[path.length-1].type = 'E';

            for(let i=0; i<5; i++) {
                let row = [];
                for(let j=0; j<5; j++) {
                    let pNode = path.find(p=>p.r===i && p.c===j);
                    let type = '-';
                    let rot = Math.floor(Math.random()*4)*90;
                    if(pNode) {
                        if(pNode.type==='S') { type = 'S'; rot = 0; } 
                        else if(pNode.type==='E') {
                            type = 'E';
                            if(pNode.inDir === 'left') rot = 0; 
                            else if(pNode.inDir === 'up') rot = 90; 
                            else if(pNode.inDir === 'down') rot = 270; 
                        } else {
                            let s = (pNode.inDir==='left'&&pNode.outDir==='right') || (pNode.inDir==='up'&&pNode.outDir==='down') || (pNode.inDir==='down'&&pNode.outDir==='up') || (pNode.inDir==='right'&&pNode.outDir==='left');
                            type = s ? '-' : 'L';
                        }
                    } else {
                        type = Math.random()>.5 ? '-' : 'L'; 
                    }
                    row.push({ r:i, c:j, type, rot: (type==='S'||type==='E') ? rot : Math.floor(Math.random()*4)*90 });
                }
                arrowState.push(row);
            }

            for(let k=0; k<4; k++) {
                let r1 = Math.floor(Math.random()*5), c1 = Math.floor(Math.random()*5);
                let r2 = Math.floor(Math.random()*5), c2 = Math.floor(Math.random()*5);
                if(arrowState[r1][c1].type!=='S' && arrowState[r1][c1].type!=='E' && 
                   arrowState[r2][c2].type!=='S' && arrowState[r2][c2].type!=='E') {
                       let tempType = arrowState[r1][c1].type;
                       arrowState[r1][c1].type = arrowState[r2][c2].type;
                       arrowState[r2][c2].type = tempType;
                   }
            }
            renderArrowGrid();
        }

        function renderArrowGrid() {
            arrowGrid.innerHTML = '';
            arrowState.forEach(row => {
                row.forEach(tile => {
                    const el = document.createElement('div');
                    el.className = 'tile';
                    if(tile.type==='S') el.classList.add('start');
                    if(tile.type==='E') el.classList.add('end');
                    if(selectedTile && selectedTile.r === tile.r && selectedTile.c === tile.c) el.classList.add('selected');
                    const def = tileDefs[tile.type] || tileDefs['-'];
                    el.innerText = def.char;
                    el.style.transform = `rotate(${tile.rot}deg)`;
                    el.onclick = () => handleTileClick(tile);
                    arrowGrid.appendChild(el);
                });
            });
            verifyArrowPath(true);
        }

        function handleTileClick(tile) {
            if(tile.type === 'S' || tile.type === 'E') return; 
            if(arrowMode === 'rotate') {
                tile.rot = (tile.rot + 90) % 360;
                renderArrowGrid();
            } else {
                if(!selectedTile) {
                    selectedTile = tile;
                    renderArrowGrid();
                } else {
                    if(selectedTile !== tile) {
                        let t1 = arrowState[selectedTile.r][selectedTile.c];
                        let t2 = arrowState[tile.r][tile.c];
                        let tempType = t1.type; let tempRot = t1.rot;
                        t1.type = t2.type; t1.rot = t2.rot;
                        t2.type = tempType; t2.rot = tempRot;
                    }
                    selectedTile = null;
                    renderArrowGrid();
                }
            }
        }

        function getConns(obj) {
            if(!obj.type) return [0,0,0,0];
            const base = tileDefs[obj.type].conn; 
            const steps = obj.rot / 90;
            const newConn = [0,0,0,0];
            for(let i=0; i<4; i++) newConn[(i + steps) % 4] = base[i];
            return newConn;
        }

        function verifyArrowPath(visualOnly = false) {
            let tiles = Array.from(document.querySelectorAll('#arrow-grid .tile'));
            tiles.forEach(t => t.classList.remove('path-active'));
            let start = arrowState.flat().find(t => t.type === 'S');
            if(!start) return false;
            let queue = [start];
            let visited = new Set();
            visited.add(`${start.r},${start.c}`);
            if(visualOnly) tiles[start.r*5 + start.c].classList.add('path-active');
            let reachedEnd = false;
            while(queue.length > 0) {
                let curr = queue.shift();
                if(curr.type === 'E') reachedEnd = true;
                const cConn = getConns(curr);
                const dirs = [[-1,0],[0,1],[1,0],[0,-1]]; 
                for(let i=0; i<4; i++) {
                    if(cConn[i]) {
                        const nr = curr.r + dirs[i][0];
                        const nc = curr.c + dirs[i][1];
                        if(nr>=0 && nr<5 && nc>=0 && nc<5) {
                            const neighbor = arrowState[nr][nc];
                            const key = `${nr},${nc}`;
                            if(!visited.has(key)) {
                                const opp = (i + 2) % 4;
                                const nConn = getConns(neighbor);
                                if(nConn[opp]) {
                                    visited.add(key);
                                    if(visualOnly) tiles[nr*5 + nc].classList.add('path-active');
                                    queue.push(neighbor);
                                }
                            }
                        }
                    }
                }
            }
            return reachedEnd;
        }

        function checkArrowWin() {
            if(verifyArrowPath()) showWin("Path Connected!");
            else {
                arrowGrid.style.transform = "translateX(5px)";
                setTimeout(()=>arrowGrid.style.transform="translateX(0)", 100);
            }
        }

        // --- GAME 3: MAZE ---
        const mazeGrid = document.getElementById('maze-grid');
        let player={x:0,y:0}, key={x:0,y:0}, door={x:0,y:0}, hasKey=false, walls=[]; 

        function generateMazeLevel() {
            mazeGrid.innerHTML = '';
            walls = Array(6).fill().map(() => Array(6).fill(1));
            let sx=0, sy=0, kx, ky, dx, dy;
            do{ kx=Math.floor(Math.random()*6); ky=Math.floor(Math.random()*6); } while(Math.abs(kx)+Math.abs(ky)<3);
            do{ dx=Math.floor(Math.random()*6); dy=Math.floor(Math.random()*6); } while(Math.abs(dx-kx)+Math.abs(dy-ky)<3);
            
            player={x:sx,y:sy}; key={x:kx,y:ky}; door={x:dx,y:dy}; hasKey=false;
            carve(sx,sy,kx,ky); carve(kx,ky,dx,dy);
            // Increased noise to 18 to make maze more open and less frustrating
            for(let i=0; i<18; i++) walls[Math.floor(Math.random()*6)][Math.floor(Math.random()*6)] = 0;
            walls[sy][sx]=0; walls[ky][kx]=0; walls[dy][dx]=0;
            renderMaze();
        }
        function carve(x1,y1,x2,y2){
            let x=x1, y=y1; walls[y][x]=0;
            while(x!=x2 || y!=y2){
                if(Math.random()>.5 && x!=x2) x+=(x<x2?1:-1);
                else if(y!=y2) y+=(y<y2?1:-1);
                else x+=(x<x2?1:-1);
                walls[y][x]=0;
            }
        }
        function renderMaze() {
            mazeGrid.innerHTML = '';
            for(let y=0; y<6; y++) for(let x=0; x<6; x++) {
                const d = document.createElement('div');
                d.className = 'maze-cell';
                d.id = `m-${x}-${y}`;
                if(x==player.x && y==player.y) d.innerHTML='<div class="icon-user"></div>';
                else if(x==key.x && y==key.y && !hasKey) d.innerHTML='<span class="icon-key">🔑</span>';
                else if(x==door.x && y==door.y) d.innerHTML='<div class="icon-door"></div>';
                mazeGrid.appendChild(d);
            }
        }
        function moveMaze(dx, dy) {
            let nx = player.x+dx, ny = player.y+dy;
            if(nx<0||nx>5||ny<0||ny>5) return;
            
            if(walls[ny][nx]===1) {
                let el = document.getElementById(`m-${nx}-${ny}`);
                el.classList.add('wall-hit'); 
                
                // Show Feedback Text
                const fb = document.getElementById('hit-msg');
                fb.classList.add('show');
                setTimeout(() => fb.classList.remove('show'), 500);
                
                setTimeout(()=>el.classList.remove('wall-hit'), 200); 
                return;
            }
            player.x=nx; player.y=ny;
            if(player.x==key.x && player.y==key.y) hasKey=true;
            if(player.x==door.x && player.y==door.y) if(hasKey) showWin("Escaped!");
            renderMaze();
        }
        document.addEventListener('keydown', e=>{
            if(currentGame===3 && document.getElementById('overlay').classList.contains('hidden')) {
                if(e.key==="ArrowUp") moveMaze(0,-1);
                if(e.key==="ArrowDown") moveMaze(0,1);
                if(e.key==="ArrowLeft") moveMaze(-1,0);
                if(e.key==="ArrowRight") moveMaze(1,0);
            }
        });
        initBubbles();
    </script>
</body>
